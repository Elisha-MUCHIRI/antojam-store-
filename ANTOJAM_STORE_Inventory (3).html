
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:Arial,sans-serif;font-size:12px;color:#1e293b;background:#f0f4f8;}

/* AUTH SCREENS */
.auth-wrap{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;background:#0d1b35;padding:20px;}
.auth-logo-wrap{text-align:center;margin-bottom:22px;}
.auth-card{background:#fff;border-radius:16px;padding:26px 28px;width:100%;max-width:460px;box-shadow:0 24px 64px rgba(0,0,0,0.4);}
.auth-tabs{display:flex;background:#f0f4f8;border-radius:10px;padding:3px;margin-bottom:20px;gap:3px;}
.auth-tab{flex:1;padding:8px;text-align:center;cursor:pointer;font-weight:700;font-size:12px;border:none;background:transparent;color:#8898aa;font-family:Arial,sans-serif;border-radius:8px;transition:all 0.18s;}
.auth-tab.active{background:#fff;color:#0d1b35;box-shadow:0 1px 4px rgba(0,0,0,0.12);}
.fg{display:flex;flex-direction:column;gap:5px;margin-bottom:13px;}
.fg label{font-size:11px;font-weight:700;color:#5a6475;display:flex;align-items:center;gap:4px;}
.fg .inp-wrap{position:relative;display:flex;}
.fg .inp-wrap input{flex:1;padding:10px 38px 10px 12px;border:1.5px solid #e2e8f0;border-radius:8px;font-size:13px;background:#fff;color:#1e293b;transition:border 0.15s;font-family:Arial,sans-serif;}
.fg .inp-wrap input:focus{outline:none;border-color:#f6a623;background:#fffdf8;}
.fg .inp-wrap input.valid{border-color:#2ecc71;}
.fg .inp-wrap input.invalid{border-color:#e74c3c;}
.fg select{padding:10px 12px;border:1.5px solid #e2e8f0;border-radius:8px;font-size:13px;background:#fff;color:#1e293b;font-family:Arial,sans-serif;}
.fg select:focus{outline:none;border-color:#f6a623;}
.fg .hint{font-size:11px;margin-top:2px;min-height:14px;}
.hint.ok{color:#1a7a45;} .hint.err{color:#c0392b;} .hint.info{color:#8898aa;}
.eye-btn{position:absolute;right:10px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:#8898aa;font-size:16px;padding:2px;line-height:1;}
.eye-btn:hover{color:#1a2744;}
.btn-auth{width:100%;padding:11px;border-radius:9px;border:none;cursor:pointer;font-size:13px;font-weight:700;font-family:Arial,sans-serif;background:#f6a623;color:#fff;margin-top:8px;transition:all 0.15s;letter-spacing:0.3px;}
.btn-auth:hover{background:#e8971a;transform:translateY(-1px);}
.btn-auth:active{transform:translateY(0);}
.btn-auth.sec{background:#0d1b35;}
.btn-auth.sec:hover{background:#1a2e5a;}
.auth-msg{border-radius:8px;padding:10px 13px;font-size:12px;margin-bottom:14px;display:flex;align-items:flex-start;gap:8px;}
.auth-msg.err{background:#fde8e8;color:#c0392b;border-left:3px solid #e74c3c;}
.auth-msg.ok{background:#d4f5e3;color:#1a7a45;border-left:3px solid #2ecc71;}
.auth-footer{color:rgba(255,255,255,0.4);font-size:10px;text-align:center;margin-top:16px;}
.admin-hint{background:#1a2744;border-radius:10px;padding:12px 14px;margin-bottom:18px;border-left:3px solid #f6a623;}
.admin-hint p{color:rgba(255,255,255,0.7);font-size:11px;line-height:1.9;margin:0;}
.admin-hint code{background:rgba(246,166,35,0.2);color:#f6a623;padding:1px 6px;border-radius:4px;font-size:11px;}
.divider{display:flex;align-items:center;gap:10px;margin:14px 0;}
.divider hr{flex:1;border:none;border-top:1px solid #e2e8f0;}
.divider span{color:#aab0bc;font-size:11px;white-space:nowrap;}
.step-bar{display:flex;align-items:center;gap:0;margin-bottom:18px;}
.step{flex:1;text-align:center;font-size:10px;font-weight:700;padding:6px 4px;color:#aab0bc;}
.step.done{color:#2ecc71;} .step.active{color:#f6a623;}
.step-line{width:20px;height:1px;background:#e2e8f0;flex-shrink:0;}
.step-line.done{background:#2ecc71;}

/* MAIN APP */
.topbar{background:#0d1b35;display:flex;align-items:center;flex-wrap:wrap;gap:0;}
.topbar-logo{padding:8px 14px;border-right:1px solid rgba(255,255,255,0.12);display:flex;align-items:center;gap:10px;flex-shrink:0;}
.topbar-user{margin-left:auto;display:flex;align-items:center;gap:10px;padding:0 12px;}
.topbar-user span{color:rgba(255,255,255,0.7);font-size:11px;}
.topbar-user strong{color:#f6a623;font-size:11px;}
.btn-logout{padding:5px 12px;border-radius:5px;border:0.5px solid rgba(255,255,255,0.25);background:transparent;color:rgba(255,255,255,0.7);font-size:11px;cursor:pointer;font-family:Arial,sans-serif;transition:all 0.15s;}
.btn-logout:hover{background:rgba(255,255,255,0.1);color:#fff;}
.nav{background:#1a2744;display:flex;align-items:center;flex-wrap:wrap;}
.tabs{display:flex;overflow-x:auto;flex:1;}
.tab{color:rgba(255,255,255,0.55);padding:10px 13px;cursor:pointer;border-bottom:3px solid transparent;white-space:nowrap;font-size:12px;font-family:Arial,sans-serif;}
.tab:hover{color:#fff;}
.tab.active{color:#fff;border-bottom-color:#f6a623;}
.content{padding:14px;max-width:1140px;margin:0 auto;font-family:Arial,sans-serif;font-size:12px;color:#1e293b;background:#f0f4f8;min-height:80vh;}
.grid4{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:10px;margin-bottom:14px;}
.grid3{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:10px;margin-bottom:14px;}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.card{background:#fff;border-radius:10px;border:0.5px solid #dde3ea;padding:14px;margin-bottom:14px;}
.card-title{font-size:13px;font-weight:700;color:#1a2744;margin-bottom:12px;display:flex;align-items:center;gap:8px;}
.stat{background:#f8fafc;border-radius:8px;padding:12px;text-align:center;border:0.5px solid #dde3ea;}
.stat .v{font-size:20px;font-weight:700;color:#1a2744;line-height:1.2;}
.stat .l{font-size:10px;color:#8898aa;margin-top:3px;text-transform:uppercase;letter-spacing:0.7px;}
.stat.gr .v{color:#1a7a45;} .stat.rd .v{color:#c0392b;} .stat.am .v{color:#b7791f;} .stat.bl .v{color:#185fa5;}
.tbl{width:100%;border-collapse:collapse;font-size:12px;}
.tbl th{background:#f8fafc;color:#8898aa;font-weight:600;padding:8px 9px;border-bottom:1.5px solid #dde3ea;text-align:left;white-space:nowrap;}
.tbl td{padding:7px 9px;border-bottom:0.5px solid #f0f4f8;vertical-align:middle;}
.tbl tr:hover td{background:#fafbff;}
.badge{display:inline-block;padding:2px 7px;border-radius:20px;font-size:10px;font-weight:700;}
.b-in{background:#d4f5e3;color:#1a7a45;} .b-out{background:#fde8e8;color:#c0392b;}
.b-ok{background:#d4f5e3;color:#1a7a45;} .b-low{background:#fef3cd;color:#856404;} .b-none{background:#fde8e8;color:#c0392b;}
.cat-section{margin-bottom:18px;}
.cat-header{display:flex;align-items:center;gap:8px;padding:8px 12px;border-radius:8px 8px 0 0;font-weight:700;font-size:12px;}
.search-row{display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap;}
.search-row input{flex:1;min-width:140px;padding:7px 10px;border:0.5px solid #dde3ea;border-radius:6px;font-size:12px;}
.search-row select{padding:7px 10px;border:0.5px solid #dde3ea;border-radius:6px;font-size:12px;background:#fff;}
.row{display:flex;gap:8px;flex-wrap:wrap;align-items:center;}
.btn{padding:7px 14px;border-radius:6px;border:none;cursor:pointer;font-size:12px;font-weight:700;font-family:Arial,sans-serif;transition:opacity 0.15s;}
.btn:hover{opacity:0.85;}
.btn-blue{background:#1a2744;color:#fff;} .btn-green{background:#2ecc71;color:#fff;}
.btn-orange{background:#f6a623;color:#fff;} .btn-red{background:#e74c3c;color:#fff;}
.btn-gray{background:#f0f4f8;color:#1e293b;border:0.5px solid #dde3ea;}
.btn-sm{padding:5px 10px;font-size:11px;}
.alert{padding:9px 12px;border-radius:6px;font-size:12px;margin-bottom:12px;}
.alert-ok{background:#d4f5e3;color:#1a7a45;} .alert-err{background:#fde8e8;color:#c0392b;} .alert-warn{background:#fef3cd;color:#856404;}
.empty{text-align:center;padding:28px;color:#8898aa;}
.scan-box{background:#000;border-radius:10px;overflow:hidden;position:relative;max-width:360px;margin:0 auto;aspect-ratio:4/3;}
.scan-box video{width:100%;height:100%;object-fit:cover;display:block;}
.scan-ol{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;pointer-events:none;}
.scan-fr{width:160px;height:160px;border:3px solid #f6a623;border-radius:8px;box-shadow:0 0 0 9999px rgba(0,0,0,0.45);}
.sc{display:none;}
.found-card{background:#1a2744;color:#fff;border-radius:8px;padding:12px;margin-bottom:10px;text-align:center;}
.found-card .fid{font-size:18px;font-weight:700;color:#f6a623;}
.found-card .fnm{font-size:12px;color:rgba(255,255,255,0.8);margin-top:2px;}
.found-card .fdt{font-size:11px;color:rgba(255,255,255,0.45);margin-top:1px;}
.type-tog{display:flex;border:0.5px solid #dde3ea;border-radius:8px;overflow:hidden;margin-bottom:10px;}
.tt-btn{flex:1;padding:8px;text-align:center;cursor:pointer;font-weight:700;font-size:12px;border:none;font-family:Arial,sans-serif;transition:all 0.2s;}
.tt-in{background:#f0fdf4;color:#1a7a45;} .tt-in.active{background:#2ecc71;color:#fff;}
.tt-out{background:#fff9f9;color:#c0392b;} .tt-out.active{background:#e74c3c;color:#fff;}
.qr-wrap{text-align:center;background:#f8fafc;border:0.5px solid #dde3ea;border-radius:8px;padding:14px;display:inline-block;}
.qr-id{font-family:monospace;font-size:12px;font-weight:700;margin-top:6px;color:#1a2744;}
@media(max-width:520px){.grid4,.grid3{grid-template-columns:1fr 1fr;}.grid2{grid-template-columns:1fr;}}

  _cache:{},     /* mirror of all shared storage keys */

/* ===== STORAGE ===== */
/* Safe wrappers — never throw, never silently fail */
/* ════════════════════════════════════════════════════════════════
   REAL-TIME SHARED STORAGE ENGINE  v2.0
   ─────────────────────────────────────────────────────────────
   SHARED keys  → window.storage(shared:true) — same data for ALL users
   PRIVATE keys → localStorage per-browser (session, admin password)
   SYNC ENGINE  → polls every 4 s, auto-refreshes all dashboards
   ════════════════════════════════════════════════════════════════ */

var SHARED_KEYS=['enm:users','enm:items','enm:txns','enm:cats'];
var PRIV_PFX='antojam_priv_';

/* ── Private helpers (localStorage, per-browser) ── */
function pvtGet(k){try{return localStorage.getItem(PRIV_PFX+k);}catch(e){return null;}}
function pvtSet(k,v){try{localStorage.setItem(PRIV_PFX+k,v);return true;}catch(e){return false;}}
function pvtDel(k){try{localStorage.removeItem(PRIV_PFX+k);}catch(e){}}

/* ── Shared helpers (window.storage shared:true, cross-user) ── */
function sharedGet(key){
  return new Promise(function(res){
    if(window.storage&&typeof window.storage.get==='function'){
      window.storage.get(key,true)
        .then(function(r){res(r?r.value:null);})
        .catch(function(){
          try{res(localStorage.getItem('antojam_sh_'+key));}catch(e){res(null);}
        });
    } else {
      try{res(localStorage.getItem('antojam_sh_'+key));}catch(e){res(null);}
    }
  });
}
function sharedSet(key,val){
  return new Promise(function(res){
    if(window.storage&&typeof window.storage.set==='function'){
      window.storage.set(key,val,true)
        .then(function(){res(true);})
        .catch(function(){
          try{localStorage.setItem('antojam_sh_'+key,val);}catch(e){}
          res(false);
        });
    } else {
      try{localStorage.setItem('antojam_sh_'+key,val);res(true);}catch(e){res(false);}
    }
  });
}

/* ── Unified dbGet/dbSet/dbDel — routes to shared or private ── */
function dbGet(key){
  /* Reads from local cache (populated by syncFromServer) */
  return S._cache[key]||null;
}
function dbSet(key,val){
  S._cache[key]=val;
  if(SHARED_KEYS.indexOf(key)>=0){
    sharedSet(key,val);       /* push to shared store */
    S._lastWrite=Date.now();  /* mark write time to avoid echo */
  } else {
    pvtSet(key,val);
  }
  return true;
}
function dbDel(key){
  delete S._cache[key];
  if(SHARED_KEYS.indexOf(key)>=0){
    if(window.storage&&typeof window.storage.delete==='function'){
      window.storage.delete(key,true).catch(function(){});
    }
    try{localStorage.removeItem('antojam_sh_'+key);}catch(e){}
  } else {
    pvtDel(key);
  }
}

/* ── Sync engine: pull remote changes → refresh all dashboards ── */
var _syncTimer=null;

async function syncFromServer(isInit){
  try{
    var changed=false;
    for(var i=0;i<SHARED_KEYS.length;i++){
      var key=SHARED_KEYS[i];
      var remote=await sharedGet(key);
      if(remote!==S._cache[key]){
        S._cache[key]=remote;
        changed=true;
      }
    }
    if(changed&&!isInit&&S.loaded&&S.screen==='app'){
      reloadFromCache();
    }
  }catch(e){}
}

function reloadFromCache(){
  try{var ri=S._cache['enm:items'];if(ri)S.items=JSON.parse(ri)||[];}catch(e){}
  try{var rt=S._cache['enm:txns'];if(rt)S.txns=JSON.parse(rt)||[];}catch(e){}
  try{
    var rc=S._cache['enm:cats'];
    if(rc){var pc=JSON.parse(rc);if(pc&&typeof pc==='object')CATS=Object.assign({},DEFAULT_CATS,pc);}
  }catch(e){}
  render();
  var dot=document.getElementById('sync-dot');
  if(dot){dot.style.background='#2ecc71';setTimeout(function(){if(dot)dot.style.background='rgba(255,255,255,0.25)';},900);}
}

function startSyncPolling(){
  if(_syncTimer)clearInterval(_syncTimer);
  _syncTimer=setInterval(function(){
    if(Date.now()-S._lastWrite>1500){syncFromServer(false);}
  },4000);
}
function stopSyncPolling(){
  if(_syncTimer){clearInterval(_syncTimer);_syncTimer=null;}
}

async function load(){
  /* Step 1: Read private session (per-browser) */
  try{
    var sessRaw=pvtGet('enm:session');
    if(sessRaw){
      var sess=JSON.parse(sessRaw);
      if(sess&&sess.email&&sess.role){
        if(sess.email===ADMIN_EMAIL&&sess.role==='Administrator'){
          S.currentUser=sess;S.screen='app';
        } else if(sess.role!=='Administrator'){
          S.currentUser=sess;S.screen='app'; /* verify below after shared data loads */
        } else {
          pvtDel('enm:session'); /* stale admin with wrong email */
        }
      }
    }
  }catch(e){pvtDel('enm:session');}

  /* Step 2: Pull ALL shared keys from server into local cache */
  await syncFromServer(true);

  /* Step 3: Load categories from cache */
  try{
    var rc=S._cache['enm:cats'];
    if(rc){var pc=JSON.parse(rc);if(pc&&typeof pc==='object')CATS=Object.assign({},DEFAULT_CATS,pc);}
  }catch(e){}

  /* Step 4: Load inventory from cache */
  try{var ri=S._cache['enm:items'];if(ri)S.items=JSON.parse(ri)||[];}catch(e){S.items=[];}
  try{var rt=S._cache['enm:txns'];if(rt)S.txns=JSON.parse(rt)||[];}catch(e){S.txns=[];}

  /* Step 5: Validate staff/supervisor session against shared users */
  if(S.currentUser&&S.currentUser.role!=='Administrator'){
    var usersRaw=S._cache['enm:users'];
    var ul=usersRaw?JSON.parse(usersRaw):[];
    if(!ul.find(function(u){return u.id===S.currentUser.id&&u.email===S.currentUser.email;})){
      pvtDel('enm:session');S.currentUser=null;S.screen='login';
    }
  }

  S.loaded=true;
  if(S.screen==='app')startSyncPolling();
}

function doLogin(){
  var em=fv('log-em').toLowerCase().trim();
  var pw=fv('log-pw');
  if(!em)return setAuthMsg('Please enter your email address.','err');
  if(!pw)return setAuthMsg('Please enter your password.','err');
  if(!validEmail(em))return setAuthMsg('Invalid email format. Example: john@gmail.com','err');

  /* ADMIN */
  if(em===ADMIN_EMAIL){
    var storedPw=pvtGet('enm:adm-pw')||ADMIN_DFLT_PW;
    if(pw!==storedPw&&pw!==ADMIN_DFLT_PW)
      return setAuthMsg('Wrong admin password. Please try again.','err');
    S.currentUser={id:'USR-ADMIN',firstName:'Elisha',lastName:'Muchiri',email:ADMIN_EMAIL,role:'Administrator'};
    pvtSet('enm:session',JSON.stringify(S.currentUser));
    S.screen='app';S.authMsg=null;startSyncPolling();render();
    return;
  }

  /* STAFF / SUPERVISOR */
  var users=getUsers();
  if(!users.length)
    return setAuthMsg('No accounts yet. Please create an account first.','err');
  var user=users.find(function(u){return u.email===em&&u.password===pw;});
  if(!user){
    var exists=users.find(function(u){return u.email===em;});
    return setAuthMsg(exists?'Wrong password. Please check and try again.':'Email not registered. Please create an account first.','err');
  }
  S.currentUser={id:user.id,firstName:user.firstName,lastName:user.lastName,email:user.email,role:user.role};
  pvtSet('enm:session',JSON.stringify(S.currentUser));
  S.screen='app';S.authMsg=null;startSyncPolling();render();
}

/* ---- register (Staff / Supervisor only) ---- */
function doRegister(){
  var fn=fv('reg-fn').trim();
  var ln=fv('reg-ln').trim();
  var em=fv('reg-em').toLowerCase().trim();
  var pw=fv('reg-pw');
  var cpw=fv('reg-cpw');
  var role=fv('reg-role')||'Staff';

  if(!fn||fn.length<2)return setAuthMsg('Please enter your first name (min 2 characters).','err');
  if(!ln||ln.length<2)return setAuthMsg('Please enter your last name (min 2 characters).','err');
  if(!em)return setAuthMsg('Please enter your email address.','err');
  if(!validEmail(em))return setAuthMsg('Please enter a valid email e.g. john@gmail.com','err');
  if(em===ADMIN_EMAIL)return setAuthMsg('That email is reserved. Use a different one.','err');
  if(!pw||pw.length<6)return setAuthMsg('Password must be at least 6 characters.','err');
  if(pw!==cpw)return setAuthMsg('Passwords do not match. Please check and try again.','err');

  var users=getUsers();
  if(users.find(function(u){return u.email===em;}))
    return setAuthMsg('This email is already registered. Please sign in.','err');

  var newUser={
    id:'USR-'+Date.now(),
    firstName:fn,lastName:ln,
    email:em,password:pw,role:role,
    created:new Date().toISOString()
  };
  users.push(newUser);
  if(!saveUsers(users))
    return setAuthMsg('Could not save account — check your browser allows storage.','err');

  /* Save session and log in */
  S.currentUser={id:newUser.id,firstName:fn,lastName:ln,email:em,role:role};
  pvtSet('enm:session',JSON.stringify(S.currentUser));
  S.screen='app';S.authMsg=null;
  startSyncPolling();render();
  showMsg('ok','Welcome '+fn+'! Your account has been created and you are now signed in.');
}

function genId(cat){var k=catKey(cat);var same=S.items.filter(function(i){return i.cat===cat;});return k+'-'+String(same.length+1).padStart(3,'0');}

  var cat=d.cat||'General';
  var item={id:genId(cat),name:d.name.trim(),cat,desc:d.desc||'',unit:d.unit||'pcs',buyP:parseFloat(d.buyP)||0,sellP:parseFloat(d.sellP)||0,minQ:parseInt(d.minQ)||5,loc:d.loc||'',qty:parseInt(d.initQ)||0,created:new Date().toISOString()};
  S.items.push(item);
  if(item.qty>0){S.txns.push({id:genTx(),iid:item.id,inm:item.name,type:'IN',qty:item.qty,price:item.buyP,total:item.qty*item.buyP,notes:'Opening stock',ts:new Date().toISOString()});}
  saveItems();saveTxns();
  S.addedItem=item;render();
  setTimeout(function(){mkQR(item);},80);
}
function recTxn(iid,type,qty,price,notes){
  var item=S.items.find(function(i){return i.id===iid;});
  if(!item)return{err:'Item not found'};
  qty=parseInt(qty)||0;price=parseFloat(price)||0;
  if(qty<=0)return{err:'Quantity must be greater than 0'};
  if(type==='OUT'&&item.qty<qty)return{err:'Insufficient stock. Available: '+item.qty+' '+item.unit};
  item.qty=type==='IN'?item.qty+qty:item.qty-qty;
  var tx={id:genTx(),iid,inm:item.name,type,qty,price,total:qty*price,notes:notes||'',user:S.currentUser?S.currentUser.firstName+' '+S.currentUser.lastName:'',ts:new Date().toISOString()};
  S.txns.push(tx);
  saveItems();saveTxns();
  return tx;
}

async function startScan(){
  try{S.stream=await navigator.mediaDevices.getUserMedia({video:{facingMode:'environment'}});S.scanning=true;render();
    setTimeout(function(){var v=document.getElementById('sv'),c=document.getElementById('sc');if(v&&c){v.srcObject=S.stream;v.play();frame(v,c);}},100);

function frame(v,c){
  if(!S.scanning||!document.contains(v))return;
  var ctx=c.getContext('2d');c.width=v.videoWidth;c.height=v.videoHeight;
  if(!c.width){S.raf=requestAnimationFrame(function(){frame(v,c);});return;}
  ctx.drawImage(v,0,0);
  var d=ctx.getImageData(0,0,c.width,c.height);
  var code=jsQR(d.data,c.width,c.height);
  if(code){var item=S.items.find(function(i){return i.id===code.data;});if(item){stopScan();S.found=item;render();return;}}
  S.raf=requestAnimationFrame(function(){frame(v,c);});
}

/* ===== MAIN APP ===== */
function isAdmin(){return S.currentUser&&S.currentUser.email===ADMIN_EMAIL&&S.currentUser.role==='Administrator';}
function isStaffOrSupervisor(){return S.currentUser&&(S.currentUser.role==='Staff'||S.currentUser.role==='Supervisor');}

function renderApp(){
  var u=S.currentUser||{};
  /* If somehow a non-admin lands on admin tab, kick them back to dashboard */
  if(S.tab==='admin'&&!isAdmin()){S.tab='dash';}
  if(S.tab==='rpt'&&!S.currentUser){S.tab='login';}
  var ts=[{id:'dash',l:'Dashboard'},{id:'inv',l:'Inventory'},{id:'add',l:'Add Item'},{id:'scan',l:'Scan'},{id:'hist',l:'History'},{id:'rpt',l:'Reports'}];
  if(isAdmin())ts.push({id:'admin',l:'Admin Panel'});
  var topbar='<div class="topbar">'+
    '<div class="topbar-logo">'+ENM_LOGO_SVG+'</div>'+
    '<div class="topbar-user">'+
    '<span style="color:rgba(255,255,255,0.7);font-size:11px;">Welcome, <strong style="color:#f6a623;font-size:12px;">'+u.firstName+' '+u.lastName+'</strong></span>'+
    '<span style="font-size:10px;padding:2px 8px;border-radius:20px;background:rgba(246,166,35,0.18);color:#f6a623;">'+u.role+'</span>'+
    (isAdmin()?'<span style="font-size:10px;padding:2px 8px;border-radius:20px;background:rgba(231,76,60,0.18);color:#e74c3c;">ADMIN</span>':'')+
    '<span title="Real-time sync active" style="display:inline-flex;align-items:center;gap:4px;font-size:10px;color:rgba(255,255,255,0.45);">'+
    '<span id="sync-dot" style="width:7px;height:7px;border-radius:50%;background:rgba(255,255,255,0.25);display:inline-block;transition:background 0.4s;"></span>Live</span>'+
    '<button class="btn-logout" onclick="doLogout()">Logout</button>'+
    '</div></div>';
  var nav='<div class="nav"><div class="tabs">'+
    ts.map(function(t){
      var isAdminTab=t.id==='admin';
      return '<div class="tab'+(S.tab===t.id?' active':'')+'" onclick="switchTab(\''+t.id+'\')" style="'+(isAdminTab?'color:rgba(231,76,60,0.8);':'')+(S.tab===t.id&&isAdminTab?'border-bottom-color:#e74c3c;color:#e74c3c;':'')+'">'+t.l+'</div>';
    }).join('')+
    '</div></div>';
  var body='<div class="content">'+(S.msg?'<div class="alert alert-'+S.msg.type+'">'+S.msg.msg+'</div>':'')+page()+'</div>';
  return topbar+nav+body;
}

function page(){
  if(S.tab==='dash')return pgDash();
  if(S.tab==='inv')return pgInv();
  if(S.tab==='add')return pgAdd();
  if(S.tab==='scan')return pgScan();
  if(S.tab==='hist')return pgHist();
  if(S.tab==='admin'&&isAdmin())return pgAdmin();
  if(S.tab==='rpt')return pgReports();
  return '';
}

function pgDash(){
  var cats=Object.keys(CATS).filter(function(c){return S.items.some(function(i){return i.cat===c;});});
  var totV=S.items.reduce(function(s,i){return s+i.qty*i.sellP;},0);
  var low=S.items.filter(function(i){return i.qty<=i.minQ;});
  var rec=[].concat(S.txns).reverse().slice(0,8);
  var catStats=cats.map(function(c){
    var ci=S.items.filter(function(i){return i.cat===c;});
    return {c,cnt:ci.length,qty:ci.reduce(function(s,i){return s+i.qty;},0),cs:catStyle(c)};
  });
  return '<div class="grid4">'+
    '<div class="stat"><div class="v">'+S.items.length+'</div><div class="l">Total SKUs</div></div>'+
    '<div class="stat gr"><div class="v">TZS '+fmt(totV)+'</div><div class="l">Stock Value</div></div>'+
    '<div class="stat am"><div class="v">'+low.length+'</div><div class="l">Low/Zero Stock</div></div>'+
    '<div class="stat bl"><div class="v">'+S.txns.length+'</div><div class="l">Total Transactions</div></div>'+
    '</div>'+
    '<div class="card"><div class="card-title">Stock by Category</div>'+
    '<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:8px;">'+
    catStats.map(function(x){
      return '<div style="border-radius:8px;padding:10px;background:'+x.cs.bg+';border:0.5px solid '+x.cs.color+'22;">'+
        '<div style="font-weight:700;font-size:11px;color:'+x.cs.color+';">'+x.c+'</div>'+
        '<div style="font-size:18px;font-weight:700;color:'+x.cs.color+';margin-top:2px;">'+x.cnt+'<span style="font-size:10px;font-weight:400;margin-left:3px;">SKUs</span></div>'+
        '<div style="font-size:10px;color:'+x.cs.color+'99;margin-top:1px;">'+x.qty+' units in stock</div></div>';
    }).join('')+'</div></div>'+
    (low.length?'<div class="card"><div class="card-title">Low / Zero Stock Alerts</div>'+
    '<div style="overflow-x:auto;"><table class="tbl"><tr><th>Code</th><th>Item</th><th>Category</th><th>In Stock</th><th>Min Level</th><th>Status</th><th></th></tr>'+
    low.slice(0,6).map(function(i){
      var cs=catStyle(i.cat);
      return '<tr><td><code>'+i.id+'</code></td><td><strong>'+i.name+'</strong></td>'+
        '<td><span style="font-size:10px;padding:2px 7px;border-radius:20px;font-weight:700;background:'+cs.bg+';color:'+cs.color+';">'+i.cat+'</span></td>'+
        '<td><strong style="color:'+(i.qty===0?'#c0392b':'#b7791f')+'">'+i.qty+' '+i.unit+'</strong></td>'+
        '<td>'+i.minQ+'</td><td><span class="badge '+(i.qty===0?'b-none':'b-low')+'">'+(i.qty===0?'OUT OF STOCK':'LOW')+'</span></td>'+
        '<td><button class="btn btn-green btn-sm" onclick="S.found=S.items.find(function(x){return x.id===\''+i.id+'\';});S.txnType=\'IN\';S.tab=\'scan\';render()">Restock</button></td></tr>';
    }).join('')+'</table></div></div>':'')+'<div class="card"><div class="card-title">Recent Transactions</div>'+
    (rec.length?'<div style="overflow-x:auto;"><table class="tbl"><tr><th>TXN</th><th>Item</th><th>Category</th><th>Type</th><th>Qty</th><th>Price</th><th>By</th><th>Time</th></tr>'+
    rec.map(function(t){
      var it=S.items.find(function(i){return i.id===t.iid;})||{};
      var cs=catStyle(it.cat||'General');
      return '<tr><td><code style="font-size:10px;">'+t.id+'</code></td><td>'+t.inm+'</td>'+
        '<td><span style="font-size:10px;padding:2px 7px;border-radius:20px;font-weight:700;background:'+cs.bg+';color:'+cs.color+';">'+(it.cat||'-')+'</span></td>'+
        '<td><span class="badge '+(t.type==='IN'?'b-in':'b-out')+'">'+t.type+'</span></td>'+
        '<td>'+t.qty+'</td><td>TZS '+fmt(t.price)+'</td>'+
        '<td style="font-size:10px;color:#8898aa;">'+(t.user||'-')+'</td>'+
        '<td style="color:#8898aa;font-size:10px;">'+fdt(t.ts)+'</td></tr>';
    }).join('')+'</table></div>':'<div class="empty">No transactions yet.</div>')+'</div>';
}

function pgInv(){
  var allCats=['all'].concat(Object.keys(CATS).filter(function(c){return S.items.some(function(i){return i.cat===c;});}));
  var fl=S.items.filter(function(i){
    var ms=!S.invSearch||i.name.toLowerCase().includes(S.invSearch.toLowerCase())||i.id.toLowerCase().includes(S.invSearch.toLowerCase());
    var mc=S.invCat==='all'||i.cat===S.invCat;
    return ms&&mc;
  });
  var grouped={};fl.forEach(function(i){grouped[i.cat]=grouped[i.cat]||[];grouped[i.cat].push(i);});
  return '<div class="card"><div class="card-title">Inventory &mdash; '+fl.length+' items</div>'+
    '<div class="search-row">'+
    '<input placeholder="Search name or code..." value="'+S.invSearch+'" oninput="S.invSearch=this.value;render()">'+
    '<select onchange="S.invCat=this.value;render()">'+allCats.map(function(c){return '<option value="'+c+'"'+(S.invCat===c?' selected':'')+'>'+( c==='all'?'All Categories':c)+'</option>';}).join('')+'</select>'+
    '<button class="btn btn-orange btn-sm" onclick="switchTab(\'add\')">+ Add Item</button>'+
    '</div>'+
    (fl.length===0?'<div class="empty">No items match your search.</div>':
    Object.keys(grouped).map(function(cat){
      var cs=catStyle(cat);var items=grouped[cat];
      return '<div class="cat-section">'+
        '<div class="cat-header" style="background:'+cs.bg+';color:'+cs.color+';">'+
        '<span style="background:'+cs.color+';color:#fff;border-radius:5px;padding:2px 7px;font-size:10px;">'+cs.icon+'</span>'+
        cat+' <span style="font-weight:400;opacity:0.7;">('+items.length+' items)</span></div>'+
        '<div style="overflow-x:auto;border:0.5px solid #dde3ea;border-top:none;border-radius:0 0 8px 8px;">'+
        '<table class="tbl"><tr><th>Code</th><th>Item Name</th><th>In Stock</th><th>Unit</th><th>Buy Price</th><th>Sell Price</th><th>Min Level</th><th>Location</th><th>Status</th></tr>'+
        items.map(function(i){
          var st=i.qty===0?'b-none':i.qty<=i.minQ?'b-low':'b-ok';
          return '<tr>'+
            '<td><code>'+i.id+'</code></td>'+
            '<td><strong>'+i.name+'</strong>'+(i.desc?'<br><span style="font-size:10px;color:#8898aa;">'+i.desc.substring(0,50)+'</span>':'')+'</td>'+
            '<td><strong style="color:'+(i.qty===0?'#c0392b':i.qty<=i.minQ?'#b7791f':'#1a7a45')+'">'+i.qty+'</strong></td>'+
            '<td>'+i.unit+'</td><td>TZS '+fmt(i.buyP)+'</td><td>TZS '+fmt(i.sellP)+'</td>'+
            '<td>'+i.minQ+'</td><td>'+(i.loc||'-')+'</td>'+
            '<td><span class="badge '+st+'">'+(i.qty===0?'OUT OF STOCK':i.qty<=i.minQ?'LOW':'OK')+'</span></td></tr>';
        }).join('')+'</table></div></div>';
    }).join(''))+'</div>';
}

function pgHist(){
  var fl=[].concat(S.txns).reverse();
  if(S.hFilter!=='all')fl=fl.filter(function(t){return t.type===S.hFilter;});
  if(S.hSearch)fl=fl.filter(function(t){return t.inm.toLowerCase().includes(S.hSearch.toLowerCase())||t.iid.toLowerCase().includes(S.hSearch.toLowerCase());});
  var totIn=S.txns.filter(function(t){return t.type==='IN';}).reduce(function(s,t){return s+t.qty;},0);
  var totOut=S.txns.filter(function(t){return t.type==='OUT';}).reduce(function(s,t){return s+t.qty;},0);
  var rev=S.txns.filter(function(t){return t.type==='OUT';}).reduce(function(s,t){return s+(t.total||0);},0);
  var cost=S.txns.filter(function(t){return t.type==='IN';}).reduce(function(s,t){return s+(t.total||0);},0);
  return '<div class="grid4">'+
    '<div class="stat gr"><div class="v">'+fmt(totIn)+'</div><div class="l">Units Imported</div></div>'+
    '<div class="stat rd"><div class="v">'+fmt(totOut)+'</div><div class="l">Units Sold</div></div>'+
    '<div class="stat bl"><div class="v">TZS '+fmt(rev)+'</div><div class="l">Total Revenue</div></div>'+
    '<div class="stat am"><div class="v">TZS '+fmt(cost)+'</div><div class="l">Total Cost (IN)</div></div>'+
    '</div><div class="card"><div class="card-title">Transaction History ('+fl.length+')</div>'+
    '<div class="search-row">'+
    '<input placeholder="Search item or code..." value="'+S.hSearch+'" oninput="S.hSearch=this.value;render()" style="flex:1;">'+
    '<select onchange="S.hFilter=this.value;render()"><option value="all">All</option><option value="IN">IN (Imports)</option><option value="OUT">OUT (Sales)</option></select>'+
    '<button class="btn btn-gray btn-sm" onclick="doCSV()">Export CSV</button>'+
    '</div>'+
    (fl.length===0?'<div class="empty">No transactions yet.</div>':
    '<div style="overflow-x:auto;"><table class="tbl">'+
    '<tr><th>TXN ID</th><th>Date</th><th>Code</th><th>Item</th><th>Type</th><th>Qty</th><th>Unit Price</th><th>Total</th><th>By</th><th>Notes</th></tr>'+
    fl.slice(0,200).map(function(t){
      return '<tr><td><code style="font-size:10px;">'+t.id+'</code></td>'+
        '<td style="font-size:10px;color:#8898aa;white-space:nowrap;">'+fdt(t.ts)+'</td>'+
        '<td><code>'+t.iid+'</code></td><td>'+t.inm+'</td>'+
        '<td><span class="badge '+(t.type==='IN'?'b-in':'b-out')+'">'+t.type+'</span></td>'+
        '<td>'+t.qty+'</td><td>TZS '+fmt(t.price)+'</td>'+
        '<td>TZS '+fmt(t.total||0)+'</td>'+
        '<td style="font-size:10px;color:#8898aa;">'+(t.user||'-')+'</td>'+
        '<td style="color:#8898aa;">'+(t.notes||'-')+'</td></tr>';
    }).join('')+'</table></div>')+'</div>';
}

/* ===== ADMIN PANEL ===== */
function pgAdmin(){
  var u=S.currentUser||{};

function adminChangeRole(uid){
  var sel=document.getElementById('role-'+uid);
  if(!sel)return;
  var newRole=sel.value;
  var users=getUsers();
  var user=users.find(function(u){return u.id===uid;});
  if(!user)return;
  /* Protect locked admin */
  if(user.email===ADMIN_EMAIL){return showMsg('err','The system owner role cannot be changed.');}
  /* Block assigning Administrator via this route */
  if(newRole==='Administrator'){return showMsg('err','Administrator role cannot be assigned here.');}
  user.role=newRole;
  saveUsers(users);
  showMsg('ok','Role updated to '+newRole+' for '+user.firstName+'.');
  adminLoadUsers();
}

function adminResetPw(uid,name){
  var np=prompt('Enter new password for '+name+' (min 6 chars):');
  if(!np)return;
  if(np.length<6){return showMsg('err','Password must be at least 6 characters.');}
  var users=getUsers();
  var user=users.find(function(u){return u.id===uid;});
  if(!user)return;
  user.password=np;
  saveUsers(users);
  showMsg('ok','Password reset for '+name+'. New password: '+np);
}

function adminChangeMyPw(){
  var np=(document.getElementById('adm-npw')||{}).value||'';
  var cp=(document.getElementById('adm-cpw')||{}).value||'';
  if(!np||!cp)return showMsg('err','Please fill in both password fields.');
  if(np.length<6)return showMsg('err','Password must be at least 6 characters.');
  if(np!==cp)return showMsg('err','Passwords do not match.');
  pvtSet('enm:adm-pw',np);
  showMsg('ok','Admin password updated successfully.');
  var n=document.getElementById('adm-npw');var c=document.getElementById('adm-cpw');
  if(n)n.value='';if(c)c.value='';
}

function adminAddUser(){
  var fn=(document.getElementById('adm-fn')||{value:''}).value.trim();
  var ln=(document.getElementById('adm-ln')||{value:''}).value.trim();
  var em=((document.getElementById('adm-em')||{value:''}).value||'').toLowerCase().trim();
  var role=(document.getElementById('adm-role')||{value:'Staff'}).value||'Staff';
  var pw=(document.getElementById('adm-pw')||{value:''}).value;

  /* Validate */
  if(!fn)return admMsg('Please enter the first name.','err');
  if(!ln)return admMsg('Please enter the last name.','err');
  if(!em)return admMsg('Please enter an email address.','err');
  if(!validEmail(em))return admMsg('Invalid email format (e.g. john@gmail.com).','err');
  if(em===ADMIN_EMAIL)return admMsg('That email is reserved for the system owner.','err');
  if(!pw)return admMsg('Please set a password.','err');
  if(pw.length<6)return admMsg('Password must be at least 6 characters.','err');

  var users=getUsers();
  if(users.find(function(u){return u.email===em;})){
    return admMsg('That email is already registered in the system.','err');
  }

  var newUser={
    id:'USR-'+Date.now(),
    firstName:fn,lastName:ln,
    email:em,password:pw,role:role,
    created:new Date().toISOString()
  };
  users.push(newUser);
  var savedOk=saveUsers(users);
  if(!savedOk)return admMsg('Save failed — storage error. Please try again.','err');

  /* Clear the form */
  ['adm-fn','adm-ln','adm-em','adm-pw'].forEach(function(id){
    var el=document.getElementById(id);if(el)el.value='';
  });
  var rs=document.getElementById('adm-role');if(rs)rs.value='Staff';

  /* Show success */
  admMsg('✓ Account created for '+fn+' '+ln+' ('+role+'). Login: '+em+' / Password: '+pw,'ok');
  adminLoadUsers();
}

function admMsg(msg,type){
  var el=document.getElementById('adm-create-msg');
  if(!el)return;
  el.innerHTML='<div class="alert alert-'+(type==='ok'?'ok':'err')+'" style="margin-bottom:10px;">'+msg+'</div>';
  if(type==='ok')setTimeout(function(){if(el)el.innerHTML='';},8000);
}

function adminDeleteUser(uid,name){
  if(!confirm('Delete user '+name+'? This cannot be undone.'))return;
  var users=getUsers();
  var target=users.find(function(u){return u.id===uid;});
  if(target&&target.email===ADMIN_EMAIL){return showMsg('err','The system owner account cannot be deleted.');}
  users=users.filter(function(u){return u.id!==uid;});
  saveUsers(users);
  showMsg('ok',name+' has been deleted.');
  adminLoadUsers();
}

function adminExportAll(){
  var users=getUsers();
  var data={exportDate:new Date().toISOString(),users:users.map(function(u){return{id:u.id,name:u.firstName+' '+u.lastName,email:u.email,role:u.role};}),items:S.items,transactions:S.txns};
  var a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob([JSON.stringify(data,null,2)],{type:'application/json'}));
  a.download='enm_full_export_'+new Date().toISOString().slice(0,10)+'.json';
  a.click();
}

function adminClearTxns(){
  if(!confirm('Clear ALL transaction history? Inventory quantities will remain unchanged. This cannot be undone.'))return;
  S.txns=[];
  saveTxns();
  showMsg('ok','All transaction history cleared.');
  render();
}

function adminResetInventory(){
  if(!confirm('Reset ALL inventory quantities to 0? Transactions will remain. This cannot be undone.'))return;
  S.items.forEach(function(i){i.qty=0;});
  saveItems();
  showMsg('ok','All inventory quantities have been reset to 0.');
  render();
}

/* ===== LIVE FIELD VALIDATION ===== */
/* gv now aliased to fv */
function setHint(hid,cls,msg){var el=document.getElementById('h-'+hid);if(el){el.className='hint '+cls;el.textContent=msg;}}
function setInpState(id,state){
  var el=document.getElementById(id);
  if(!el)return;
  el.classList.remove('valid','invalid');
  if(state==='ok')el.classList.add('valid');
  else if(state==='err')el.classList.add('invalid');
}
function liveCheck(id,field){
  var val=fv(id).trim();
  if(field==='fn'){
    if(!val){setInpState(id,'');setHint('fn','info','');}
    else if(val.length<2){setInpState(id,'err');setHint('fn','err','Must be at least 2 characters');}
    else{setInpState(id,'ok');setHint('fn','ok','Looks good');}
  } else if(field==='ln'){
    if(!val){setInpState(id,'');setHint('ln','info','');}
    else if(val.length<2){setInpState(id,'err');setHint('ln','err','Must be at least 2 characters');}
    else{setInpState(id,'ok');setHint('ln','ok','Looks good');}
  } else if(field==='em'){
    if(!val){setInpState(id,'');setHint('em','info','');}
    else if(val===ADMIN_EMAIL){setInpState(id,'err');setHint('em','err','This email is reserved');}
    else if(!validEmail(val)){setInpState(id,'err');setHint('em','err','Enter a valid email like name@domain.com');}
    else{setInpState(id,'ok');setHint('em','ok','Valid email address');}
  } else if(field==='pw'){
    if(!val){setInpState(id,'');setHint('pw','info','');}
    else if(val.length<6){setInpState(id,'err');setHint('pw','err','Minimum 6 characters ('+val.length+'/6)');}
    else{setInpState(id,'ok');setHint('pw','ok','Strong enough');}
    /* Re-check confirm */
    var cpv=fv('reg-cpw');
    if(cpv){liveCheck('reg-cpw','cpw');}
  } else if(field==='cpw'){
    var pw=fv('reg-pw');
    if(!val){setInpState(id,'');setHint('cpw','info','');}
    else if(val!==pw){setInpState(id,'err');setHint('cpw','err','Passwords do not match');}
    else{setInpState(id,'ok');setHint('cpw','ok','Passwords match');}
  }
}


/* ===== REPORTS & EXPORTS MODULE ===== */

/* ---- helpers ---- */
function rptFmt(n){return Math.round(Number(n)||0).toLocaleString();}
function rptDate(iso){return iso?iso.slice(0,10):'';}
function rptMonth(iso){return iso?iso.slice(0,7):'';}

/* Filter transactions by date range and category */
function rptTxns(){
  var txns=S.txns;
  if(S.rptFrom) txns=txns.filter(function(t){return t.ts>=S.rptFrom;});
  if(S.rptTo)   txns=txns.filter(function(t){return t.ts<=S.rptTo+'T23:59:59';});
  if(S.rptCat!=='all'){
    var catIds=S.items.filter(function(i){return i.cat===S.rptCat;}).map(function(i){return i.id;});
    txns=txns.filter(function(t){return catIds.indexOf(t.iid)!==-1;});
  }
  return txns;
}
function rptItems(){
  if(S.rptCat==='all') return S.items;
  return S.items.filter(function(i){return i.cat===S.rptCat;});
}

/* ─── SUMMARY REPORT ─────────────────────────────────── */
function rptSummary(){
  var txns=rptTxns();
  var items=rptItems();
  var inTxns=txns.filter(function(t){return t.type==='IN';});
  var outTxns=txns.filter(function(t){return t.type==='OUT';});
  var revenue=outTxns.reduce(function(s,t){return s+(t.total||0);},0);
  var cost=inTxns.reduce(function(s,t){return s+(t.total||0);},0);
  var profit=revenue-cost;
  var stockVal=items.reduce(function(s,i){return s+i.qty*i.sellP;},0);
  var lowStock=items.filter(function(i){return i.qty>0&&i.qty<=i.minQ;});
  var outOfStock=items.filter(function(i){return i.qty===0;});
  var totalUnitsIn=inTxns.reduce(function(s,t){return s+t.qty;},0);
  var totalUnitsOut=outTxns.reduce(function(s,t){return s+t.qty;},0);

  var kpis=
    '<div class="rpt-grid">'+
    '<div class="rpt-kpi"><div class="rk-icon">&#128200;</div><div class="rk-val">TZS '+rptFmt(revenue)+'</div><div class="rk-lbl">Total Revenue</div><div class="rk-sub">'+outTxns.length+' sales</div></div>'+
    '<div class="rpt-kpi"><div class="rk-icon">&#128181;</div><div class="rk-val">TZS '+rptFmt(cost)+'</div><div class="rk-lbl">Total Cost (Imports)</div><div class="rk-sub">'+inTxns.length+' imports</div></div>'+
    '<div class="rpt-kpi"><div class="rk-icon">&#128176;</div><div class="rk-val '+(profit>=0?'profit-pos':'profit-neg')+'">TZS '+rptFmt(Math.abs(profit))+'</div><div class="rk-lbl">'+(profit>=0?'Gross Profit':'Gross Loss')+'</div><div class="rk-sub '+(profit>=0?'':'neg')+'">'+(profit>=0?'+':'-')+rptFmt(Math.abs(revenue>0?(profit/revenue*100):0))+'% margin</div></div>'+
    '<div class="rpt-kpi"><div class="rk-icon">&#128230;</div><div class="rk-val">TZS '+rptFmt(stockVal)+'</div><div class="rk-lbl">Current Stock Value</div><div class="rk-sub">'+items.length+' SKUs</div></div>'+
    '</div>'+
    '<div class="rpt-grid">'+
    '<div class="rpt-kpi"><div class="rk-icon">&#128077;</div><div class="rk-val">'+rptFmt(totalUnitsIn)+'</div><div class="rk-lbl">Units Imported</div></div>'+
    '<div class="rpt-kpi"><div class="rk-icon">&#128078;</div><div class="rk-val">'+rptFmt(totalUnitsOut)+'</div><div class="rk-lbl">Units Sold</div></div>'+
    '<div class="rpt-kpi"><div class="rk-icon">&#9888;</div><div class="rk-val" style="color:#b7791f;">'+lowStock.length+'</div><div class="rk-lbl">Low Stock Items</div></div>'+
    '<div class="rpt-kpi"><div class="rk-icon">&#128683;</div><div class="rk-val" style="color:#c0392b;">'+outOfStock.length+'</div><div class="rk-lbl">Out of Stock</div></div>'+
    '</div>';

  /* Category breakdown bars */
  var catRows=Object.keys(CATS).map(function(cat){
    var ci=items.filter(function(i){return i.cat===cat;});
    var catOut=outTxns.filter(function(t){
      var it=S.items.find(function(i){return i.id===t.iid;});
      return it&&it.cat===cat;
    });
    var catRev=catOut.reduce(function(s,t){return s+(t.total||0);},0);
    return {cat,cnt:ci.length,qty:ci.reduce(function(s,i){return s+i.qty;},0),rev:catRev,cs:catStyle(cat)};
  }).filter(function(x){return x.cnt>0;}).sort(function(a,b){return b.rev-a.rev;});
  var maxRev=Math.max.apply(null,catRows.map(function(x){return x.rev;}))||1;

  var catBreakdown='<div class="card"><div class="card-title">Revenue by Category</div>'+
    catRows.map(function(x){
      var pct=Math.round(x.rev/maxRev*100);
      return '<div class="rpt-bar-wrap">'+
        '<div class="rpt-bar-label"><span style="font-weight:700;color:'+x.cs.color+';">'+x.cat+'</span><span>TZS '+rptFmt(x.rev)+'</span></div>'+
        '<div class="rpt-bar-bg"><div class="rpt-bar-fill" style="width:'+pct+'%;background:'+x.cs.color+';"></div></div>'+
        '</div>';
    }).join('')+'</div>';

  return kpis+catBreakdown;
}

/* ─── STOCK REPORT ───────────────────────────────────── */

/* ─── PROFIT & LOSS ──────────────────────────────────── */
function rptProfit(){
  var txns=rptTxns();
  var inTxns=txns.filter(function(t){return t.type==='IN';});
  var outTxns=txns.filter(function(t){return t.type==='OUT';});
  var revenue=outTxns.reduce(function(s,t){return s+(t.total||0);},0);
  var cost=inTxns.reduce(function(s,t){return s+(t.total||0);},0);
  var profit=revenue-cost;
  var margin=revenue>0?Math.round(profit/revenue*1000)/10:0;

  /* Per-item profit analysis */
  var itemMap={};
  outTxns.forEach(function(t){
    var it=S.items.find(function(i){return i.id===t.iid;});
    if(!it)return;
    if(!itemMap[t.iid]) itemMap[t.iid]={item:it,units:0,revenue:0,cost:0};
    itemMap[t.iid].units+=t.qty;
    itemMap[t.iid].revenue+=(t.total||0);
    itemMap[t.iid].cost+=t.qty*it.buyP;
  });
  var rows=Object.values(itemMap).map(function(x){
    x.profit=x.revenue-x.cost;
    x.margin=x.revenue>0?Math.round(x.profit/x.revenue*1000)/10:0;
    return x;
  }).sort(function(a,b){return b.profit-a.profit;});

  var summary='<div class="card">'+
    '<div class="rpt-section-title">Profit & Loss Summary</div>'+
    '<div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;margin-bottom:14px;">'+
    '<div style="background:#f0fdf4;border-radius:8px;padding:14px;border:0.5px solid #a7f3d0;">'+
    '<div style="font-size:11px;color:#1a7a45;font-weight:700;margin-bottom:4px;">TOTAL REVENUE</div>'+
    '<div style="font-size:20px;font-weight:700;color:#1a7a45;">TZS '+rptFmt(revenue)+'</div>'+
    '<div style="font-size:11px;color:#8898aa;margin-top:2px;">'+outTxns.length+' transactions</div>'+
    '</div>'+
    '<div style="background:#fff9f9;border-radius:8px;padding:14px;border:0.5px solid #fca5a5;">'+
    '<div style="font-size:11px;color:#c0392b;font-weight:700;margin-bottom:4px;">TOTAL COST</div>'+
    '<div style="font-size:20px;font-weight:700;color:#c0392b;">TZS '+rptFmt(cost)+'</div>'+
    '<div style="font-size:11px;color:#8898aa;margin-top:2px;">'+inTxns.length+' imports</div>'+
    '</div>'+
    '<div style="background:'+(profit>=0?'#f0fdf4':'#fff9f9')+';border-radius:8px;padding:14px;border:0.5px solid '+(profit>=0?'#a7f3d0':'#fca5a5')+';">'+
    '<div style="font-size:11px;color:'+(profit>=0?'#1a7a45':'#c0392b')+';font-weight:700;margin-bottom:4px;">'+(profit>=0?'GROSS PROFIT':'GROSS LOSS')+'</div>'+
    '<div style="font-size:20px;font-weight:700;color:'+(profit>=0?'#1a7a45':'#c0392b')+';">TZS '+rptFmt(Math.abs(profit))+'</div>'+
    '<div style="font-size:11px;color:#8898aa;margin-top:2px;">Margin: '+margin+'%</div>'+
    '</div>'+
    '</div></div>';

  var detail=rows.length?'<div class="card">'+
    '<div class="rpt-section-title">Per-Item Profit Analysis</div>'+
    '<div style="overflow-x:auto;"><table class="tbl">'+
    '<tr><th>Code</th><th>Item</th><th>Category</th><th>Units Sold</th><th>Revenue</th><th>Cost</th><th>Profit</th><th>Margin</th></tr>'+
    rows.map(function(x){
      var cs=catStyle(x.item.cat);
      return '<tr>'+
        '<td><code>'+x.item.id+'</code></td>'+
        '<td><strong>'+x.item.name+'</strong></td>'+
        '<td><span style="font-size:10px;font-weight:700;padding:2px 7px;border-radius:20px;background:'+cs.bg+';color:'+cs.color+';">'+x.item.cat+'</span></td>'+
        '<td>'+x.units+'</td>'+
        '<td>TZS '+rptFmt(x.revenue)+'</td>'+
        '<td>TZS '+rptFmt(x.cost)+'</td>'+
        '<td class="'+(x.profit>=0?'profit-pos':'profit-neg')+'">TZS '+rptFmt(Math.abs(x.profit))+'</td>'+
        '<td class="'+(x.margin>=0?'profit-pos':'profit-neg')+'">'+x.margin+'%</td>'+
        '</tr>';
    }).join('')+
    '</table></div></div>':
    '<div class="card"><div class="empty" style="padding:24px;text-align:center;">No sales data yet for profit analysis.</div></div>';

  return summary+detail;
}

/* ─── TOP ITEMS ──────────────────────────────────────── */
function rptTopItems(){
  var txns=rptTxns();
  var outTxns=txns.filter(function(t){return t.type==='OUT';});
  var inTxns=txns.filter(function(t){return t.type==='IN';});

  /* Top by revenue */
  var revMap={};
  outTxns.forEach(function(t){
    if(!revMap[t.iid]) revMap[t.iid]={id:t.iid,name:t.inm,units:0,revenue:0};
    revMap[t.iid].units+=t.qty;
    revMap[t.iid].revenue+=(t.total||0);
  });
  var topRev=Object.values(revMap).sort(function(a,b){return b.revenue-a.revenue;}).slice(0,10);

  /* Top by movement (units imported) */
  var movMap={};
  inTxns.forEach(function(t){
    if(!movMap[t.iid]) movMap[t.iid]={id:t.iid,name:t.inm,units:0};
    movMap[t.iid].units+=t.qty;
  });
  var topMov=Object.values(movMap).sort(function(a,b){return b.units-a.units;}).slice(0,10);
  var maxRev=topRev.length?topRev[0].revenue:1;
  var maxMov=topMov.length?topMov[0].units:1;

  var revCard='<div class="card">'+
    '<div class="rpt-section-title">Top 10 Items by Revenue</div>'+
    (topRev.length?topRev.map(function(x,i){
      var it=S.items.find(function(ii){return ii.id===x.id;})||{cat:'—'};
      var cs=catStyle(it.cat);
      var pct=Math.round(x.revenue/maxRev*100);
      return '<div class="rpt-bar-wrap" style="margin-bottom:8px;">'+
        '<div class="rpt-bar-label">'+
        '<span><strong style="color:#1a2744;">'+(i+1)+'. '+x.name+'</strong> <span style="font-size:10px;padding:1px 6px;border-radius:10px;background:'+cs.bg+';color:'+cs.color+';">'+it.cat+'</span></span>'+
        '<span style="font-weight:700;color:#1a7a45;">TZS '+rptFmt(x.revenue)+' &nbsp;<span style="color:#8898aa;font-weight:400;">('+x.units+' units)</span></span>'+
        '</div>'+
        '<div class="rpt-bar-bg"><div class="rpt-bar-fill" style="width:'+pct+'%;background:'+cs.color+';"></div></div>'+
        '</div>';
    }).join(''):'<div class="empty" style="padding:20px;text-align:center;">No sales data yet.</div>')+
    '</div>';

  var movCard='<div class="card">'+
    '<div class="rpt-section-title">Top 10 Most Imported Items</div>'+
    (topMov.length?topMov.map(function(x,i){
      var it=S.items.find(function(ii){return ii.id===x.id;})||{cat:'—'};
      var cs=catStyle(it.cat);
      var pct=Math.round(x.units/maxMov*100);
      return '<div class="rpt-bar-wrap" style="margin-bottom:8px;">'+
        '<div class="rpt-bar-label">'+
        '<span><strong style="color:#1a2744;">'+(i+1)+'. '+x.name+'</strong> <span style="font-size:10px;padding:1px 6px;border-radius:10px;background:'+cs.bg+';color:'+cs.color+';">'+it.cat+'</span></span>'+
        '<span style="font-weight:700;color:#185fa5;">'+x.units+' units imported</span>'+
        '</div>'+
        '<div class="rpt-bar-bg"><div class="rpt-bar-fill" style="width:'+pct+'%;background:'+cs.color+';"></div></div>'+
        '</div>';
    }).join(''):'<div class="empty" style="padding:20px;text-align:center;">No import data yet.</div>')+
    '</div>';

  return revCard+movCard;
}

/* ─── MONTHLY TREND ──────────────────────────────────── */
function rptMonthly(){
  var txns=rptTxns();
  /* Group by month */
  var months={};
  txns.forEach(function(t){
    var m=t.ts?t.ts.slice(0,7):'unknown';
    if(!months[m]) months[m]={month:m,revenue:0,cost:0,inQty:0,outQty:0,inCount:0,outCount:0};
    if(t.type==='OUT'){months[m].revenue+=(t.total||0);months[m].outQty+=t.qty;months[m].outCount++;}
    else{months[m].cost+=(t.total||0);months[m].inQty+=t.qty;months[m].inCount++;}
  });
  var rows=Object.values(months).sort(function(a,b){return a.month<b.month?-1:1;});
  if(!rows.length) return '<div class="card"><div class="empty" style="padding:30px;text-align:center;">No transaction data for trend analysis.</div></div>';

  var maxRev=Math.max.apply(null,rows.map(function(r){return r.revenue;}))||1;
  var cumProfit=0;

  var trendBars='<div class="card">'+
    '<div class="rpt-section-title">Monthly Revenue Trend</div>'+
    rows.map(function(r){
      var pct=Math.round(r.revenue/maxRev*100);
      return '<div class="rpt-bar-wrap" style="margin-bottom:10px;">'+
        '<div class="rpt-bar-label"><span style="font-weight:700;">'+r.month+'</span><span style="color:#1a7a45;font-weight:700;">TZS '+rptFmt(r.revenue)+'</span></div>'+
        '<div class="rpt-bar-bg" style="height:18px;"><div class="rpt-bar-fill" style="width:'+pct+'%;background:#1a2744;"></div></div>'+
        '</div>';
    }).join('')+'</div>';

  var monthlyTable='<div class="card">'+
    '<div class="rpt-section-title">Monthly Summary Table</div>'+
    '<div style="overflow-x:auto;"><table class="tbl">'+
    '<tr><th>Month</th><th>Revenue</th><th>Cost</th><th>Profit</th><th>Margin</th><th>Units In</th><th>Units Out</th><th>Transactions</th></tr>'+
    rows.map(function(r){
      var p=r.revenue-r.cost;
      cumProfit+=p;
      var m=r.revenue>0?Math.round(p/r.revenue*1000)/10:0;
      return '<tr>'+
        '<td><strong>'+r.month+'</strong></td>'+
        '<td style="color:#1a7a45;">TZS '+rptFmt(r.revenue)+'</td>'+
        '<td style="color:#c0392b;">TZS '+rptFmt(r.cost)+'</td>'+
        '<td class="'+(p>=0?'profit-pos':'profit-neg')+'">TZS '+rptFmt(Math.abs(p))+'</td>'+
        '<td class="'+(m>=0?'profit-pos':'profit-neg')+'">'+m+'%</td>'+
        '<td>'+r.inQty+'</td>'+
        '<td>'+r.outQty+'</td>'+
        '<td>'+(r.inCount+r.outCount)+'</td>'+
        '</tr>';
    }).join('')+
    '<tr style="background:#f0f4f8;font-weight:700;">'+
    '<td>TOTALS</td>'+
    '<td style="color:#1a7a45;">TZS '+rptFmt(rows.reduce(function(s,r){return s+r.revenue;},0))+'</td>'+
    '<td style="color:#c0392b;">TZS '+rptFmt(rows.reduce(function(s,r){return s+r.cost;},0))+'</td>'+
    '<td class="'+(cumProfit>=0?'profit-pos':'profit-neg')+'">TZS '+rptFmt(Math.abs(cumProfit))+'</td>'+
    '<td></td>'+
    '<td>'+rows.reduce(function(s,r){return s+r.inQty;},0)+'</td>'+
    '<td>'+rows.reduce(function(s,r){return s+r.outQty;},0)+'</td>'+
    '<td>'+rows.reduce(function(s,r){return s+r.inCount+r.outCount;},0)+'</td>'+
    '</tr></table></div></div>';

  return trendBars+monthlyTable;
}

/* ─── EXPORTS ────────────────────────────────────────── */
function rptExportCSV(){
  var sub=S.rptTab||'summary';
  var rows=[];
  var filename='enm_report_'+sub+'_'+new Date().toISOString().slice(0,10)+'.csv';

  if(sub==='sales'||sub==='summary'){
    rows.push(['Date','TXN ID','Code','Item','Type','Qty','Unit Price','Total','By','Notes']);
    rptTxns().forEach(function(t){
      rows.push([rptDate(t.ts),t.id,t.iid,t.inm,t.type,t.qty,t.price,t.total||0,t.user||'',t.notes||'']);
    });
  } else if(sub==='stock'){
    rows.push(['Code','Item','Category','In Stock','Unit','Buy Price','Sell Price','Stock Cost','Stock Value','Min Level','Location','Status']);
    rptItems().forEach(function(i){
      var st=i.qty===0?'OUT OF STOCK':i.qty<=i.minQ?'LOW':'OK';
      rows.push([i.id,i.name,i.cat,i.qty,i.unit,i.buyP,i.sellP,i.qty*i.buyP,i.qty*i.sellP,i.minQ,i.loc||'',st]);
    });
  } else if(sub==='profit'){
    rows.push(['Code','Item','Category','Units Sold','Revenue','Cost','Profit','Margin %']);
    var outT=rptTxns().filter(function(t){return t.type==='OUT';});
    var mp={};
    outT.forEach(function(t){
      var it=S.items.find(function(i){return i.id===t.iid;});if(!it)return;
      if(!mp[t.iid])mp[t.iid]={item:it,units:0,rev:0,cost:0};
      mp[t.iid].units+=t.qty;mp[t.iid].rev+=(t.total||0);mp[t.iid].cost+=t.qty*it.buyP;
    });
    Object.values(mp).sort(function(a,b){return b.rev-a.rev;}).forEach(function(x){
      var p=x.rev-x.cost;var m=x.rev>0?Math.round(p/x.rev*1000)/10:0;
      rows.push([x.item.id,x.item.name,x.item.cat,x.units,x.rev,x.cost,p,m+'%']);
    });
  } else if(sub==='monthly'){
    rows.push(['Month','Revenue','Cost','Profit','Margin %','Units In','Units Out','Transactions']);
    var txns=rptTxns(),months={};
    txns.forEach(function(t){
      var m=t.ts?t.ts.slice(0,7):'';
      if(!months[m])months[m]={m,rev:0,cost:0,inQ:0,outQ:0,cnt:0};
      if(t.type==='OUT'){months[m].rev+=(t.total||0);months[m].outQ+=t.qty;}
      else{months[m].cost+=(t.total||0);months[m].inQ+=t.qty;}
      months[m].cnt++;
    });
    Object.values(months).sort(function(a,b){return a.m<b.m?-1:1;}).forEach(function(r){
      var p=r.rev-r.cost;var mg=r.rev>0?Math.round(p/r.rev*1000)/10:0;
      rows.push([r.m,r.rev,r.cost,p,mg+'%',r.inQ,r.outQ,r.cnt]);
    });
  } else {
    rows.push(['Report','Generated']);
    rows.push([sub,new Date().toISOString()]);
  }

  var csv=rows.map(function(r){return r.map(function(v){return '"'+String(v).replace(/"/g,'""')+'"';}).join(',');}).join('\n');
  var a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob([csv],{type:'text/csv'}));
  a.download=filename;a.click();
}

function rptExportFullJSON(){
  getUsers().then(function(users){

      company:'ENM Technologies',
      exportDate:new Date().toISOString(),

      summary:{
        totalItems:S.items.length,
        totalTransactions:S.txns.length,
        totalUsers:users.length,

/* ===== ADMIN RENDER HELPERS ===== */
function renderItemsTable(){
  if(!S.items.length) return '<div class="empty" style="padding:20px;text-align:center;color:#8898aa;">No items yet. Use the Add Item tab to add your first item.</div>';
  var rows = S.items.map(function(i){
    var cs = catStyle(i.cat);
    return '<tr>'+
      '<td><code>'+i.id+'</code></td>'+
      '<td><strong>'+i.name+'</strong></td>'+
      '<td><span style="font-size:10px;font-weight:700;padding:1px 7px;border-radius:20px;background:'+cs.bg+';color:'+cs.color+';">'+i.cat+'</span></td>'+
      '<td>'+i.qty+' '+i.unit+'</td>'+
      '<td><button class="btn btn-red btn-sm" style="font-size:10px;" data-iid="'+i.id+'" onclick="adminRemoveItem(this.dataset.iid)">Remove</button></td>'+
      '</tr>';
  });
  return rows.join('');
}

function renderCatsTable(){
  var rows = Object.keys(CATS).map(function(cat){
    var cs = CATS[cat];
    var itemCnt = S.items.filter(function(i){return i.cat===cat;}).length;
    var isBuiltin = DEFAULT_CATS.hasOwnProperty(cat);
    return '<tr>'+
      '<td><span style="display:inline-flex;align-items:center;justify-content:center;width:24px;height:24px;background:'+cs.color+';color:#fff;border-radius:5px;font-size:11px;font-weight:700;">'+cs.icon+'</span></td>'+
      '<td><strong>'+cat+'</strong>'+(isBuiltin?' <span style="font-size:9px;color:#8898aa;">(built-in)</span>':'')+' </td>'+
      '<td>'+itemCnt+'</td>'+
      '<td><span style="display:inline-block;width:20px;height:20px;background:'+cs.bg+';border:1px solid '+cs.color+';border-radius:4px;vertical-align:middle;"></span></td>'+
      '<td>'+(itemCnt===0?
        '<button class="btn btn-red btn-sm" style="font-size:10px;" data-cat="'+encodeURIComponent(cat)+'" onclick="adminRemoveCat(decodeURIComponent(this.dataset.cat))">Delete</button>':
        '<span style="font-size:10px;color:#8898aa;">Has items</span>')+
      '</td></tr>';
  });
  return rows.join('');
}

/* ===== ITEM & CATEGORY MANAGEMENT ===== */

function itmMsg(msg,type){
  var el=document.getElementById('adm-items-msg');
  if(!el)return;
  el.innerHTML='<div class="alert alert-'+(type==='ok'?'ok':'err')+'" style="margin-bottom:8px;">'+msg+'</div>';
  if(type==='ok')setTimeout(function(){if(el)el.innerHTML='';},5000);
}
function catMsg(msg,type){
  var el=document.getElementById('adm-cats-msg');
  if(!el)return;
  el.innerHTML='<div class="alert alert-'+(type==='ok'?'ok':'err')+'" style="margin-bottom:8px;">'+msg+'</div>';
  if(type==='ok')setTimeout(function(){if(el)el.innerHTML='';},5000);
}

function adminRemoveItem(id){
  var item=S.items.find(function(i){return i.id===id;});
  if(!item)return;
  if(!confirm('Remove "'+item.name+'" from inventory?\n\nThis will also remove all its transaction history.'))return;
  S.items=S.items.filter(function(i){return i.id!==id;});
  S.txns=S.txns.filter(function(t){return t.iid!==id;});
  saveItems();saveTxns();
  showMsg('ok','"'+item.name+'" removed from inventory.');
  render();
  setTimeout(adminLoadUsers,80);
}

function adminClearAllItems(){
  if(!confirm('Remove ALL '+S.items.length+' items from inventory?\n\nAll transaction history will also be cleared.\nThis cannot be undone.'))return;
  S.items=[];
  S.txns=[];
  saveItems();saveTxns();
  showMsg('ok','All items cleared. Your inventory is now empty — add your own items using the Add Item tab.');
  render();
}

function adminAddCat(){
  var name=(document.getElementById('new-cat-name')||{value:''}).value.trim();
  if(!name)return catMsg('Please enter a category name.','err');
  if(name.length<2)return catMsg('Category name must be at least 2 characters.','err');
  if(CATS[name])return catMsg('"'+name+'" already exists.','err');
  CATS[name]=nextCatColour(name);
  saveCats();
  var el=document.getElementById('new-cat-name');if(el)el.value='';
  catMsg('Category "'+name+'" added successfully.','ok');
  render();
  setTimeout(adminLoadUsers,80);
}

function adminRemoveCat(name){
  if(!CATS[name])return;
  var cnt=S.items.filter(function(i){return i.cat===name;}).length;
  if(cnt>0)return catMsg('Cannot delete "'+name+'" — it has '+cnt+' item(s). Remove the items first.','err');
  if(!confirm('Delete category "'+name+'"?'))return;
  delete CATS[name];
  saveCats();
  catMsg('Category "'+name+'" deleted.','ok');
  render();
  setTimeout(adminLoadUsers,80);
}

/* ===== FORM HANDLERS ===== */
function doAdd(e){e.preventDefault();var fd=new FormData(e.target),d={};fd.forEach(function(v,k){d[k]=v;});if(!d.name||!d.name.trim()){showMsg('err','Item name is required.');return;}addItem(d);}
function doTxn(e){
  e.preventDefault();var fd=new FormData(e.target),d={};fd.forEach(function(v,k){d[k]=v;});
  recTxn(S.found.id,S.txnType,d.qty,d.price,d.notes).then(function(r){
    if(r.err)showMsg('err',r.err);
    else{showMsg('ok',(S.txnType==='IN'?'Import':'Sale')+' recorded: '+d.qty+' x '+S.found.name);S.found=null;S.txnType='IN';render();}
  });
}
function doManual(){var vv=((document.getElementById('mid')||{}).value||'').trim().toUpperCase();if(!vv)return;var item=S.items.find(function(i){return i.id===vv;});if(item){S.found=item;render();}else showMsg('err','Code "'+vv+'" not found.');}
function doPrint(){var el=document.getElementById('qr-print');if(!el)return;var w=window.open('','_blank','width=320,height=320');if(!w)return;w.document.write('<html><body style="text-align:center;font-family:Arial;padding:20px;">'+el.innerHTML+'</body></html>');w.document.close();setTimeout(function(){w.print();},300);}
function doCSV(){
  var rows=[['TXN ID','Date','Code','Item','Type','Qty','Unit Price','Total','By','Notes']];
  [].concat(S.txns).reverse().forEach(function(t){rows.push([t.id,fdt(t.ts),t.iid,t.inm,t.type,t.qty,t.price,t.total||0,t.user||'',t.notes||'']);});
  var csv=rows.map(function(r){return r.map(function(v){return '"'+v+'"';}).join(',');}).join('\n');
  var a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob([csv],{type:'text/csv'}));
  a.download='enm_store_'+new Date().toISOString().slice(0,10)+'.csv';
  a.click();
}
